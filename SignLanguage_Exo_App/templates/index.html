
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shruthi Bandhu | AI Sign Translator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --primary-color: #5d9cec;
            --text-dark: #434a54;
            --text-light: #aab2bd;
            --shadow: 0 10px 20px rgba(0,0,0,0.05);
            
            /* RED THEME VARS */
            --red-bg: #ffebee;       /* Light Pink/Red */
            --red-border: #ba0b8c;   /* Decent Red */
            --red-text: #ba0b8c;     /* Dark Red */
            --red-accent: #ba0b8c;   /* Deep Red */
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            background-color: var(--card-bg);
            padding: 20px 0;
            box-shadow: var(--shadow);
            text-align: center;
            margin-bottom: 30px;
            z-index: 10;
        }

        h1 { margin: 0; font-weight: 600; color: var(--primary-color); }
        .subtitle { font-size: 0.9rem; color: var(--text-light); }

        /* --- LAYOUT GRID --- */
        .main-container {
            display: flex;
            flex-direction: row; /* Horizontal Layout */
            align-items: flex-start;
            justify-content: center;
            gap: 30px;
            width: 95%;
            max-width: 1200px;
            padding-bottom: 50px;
        }

        /* --- LEFT SIDEBAR (CONTROLS) --- */
        .controls {
            display: flex;
            flex-direction: column; /* Stack items vertically */
            gap: 20px;
            background: #fff;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 250px; /* Fixed width sidebar */
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Audio Toggle Styling */
        .audio-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f1f1f1;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .status-dot {
            height: 12px; width: 12px;
            background-color: #ed5565; /* Red initially */
            border-radius: 50%;
            flex-shrink: 0;
        }
        #audio-label-text { font-size: 0.9rem; font-weight: 500; }

        /* Select Styling */
        select {
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e6e9ed;
            font-family: 'Poppins', sans-serif;
            color: var(--text-dark);
            background-color: #f9f9f9;
            width: 100%;
            outline: none;
            cursor: pointer;
        }
        select:hover { border-color: var(--primary-color); }

        /* --- RIGHT CONTENT (VIDEO + OUTPUT) --- */
        .content-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex-grow: 1; /* Take remaining space */
            max-width: 800px;
        }

        .video-card {
            background: var(--card-bg);
            padding: 10px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .video-feed {
            width: 100%;
            border-radius: 15px;
            border: 2px solid #e6e9ed;
        }

        /* --- RED OUTPUT BOX --- */
        .output-card {
            background: var(--red-bg); /* Light Red Background */
            width: 100%;
            padding: 25px;
            box-sizing: border-box;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
            
            /* The Red Border Box Look */
            border: 2px solid var(--red-border);
            border-left: 10px solid var(--red-accent);
        }

        .output-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--red-text);
            opacity: 0.7;
            margin-bottom: 10px;
        }

        #result-text {
            font-size: 2rem;
            font-weight: 600;
            color: var(--red-accent); /* Deep Red Text */
            min-height: 45px;
        }

    </style>
</head>
<body>

    <header>
        <h1>Shruthi Bandhu</h1>
        <div class="subtitle">AI-Powered Sign Language Translator</div>
    </header>

    <div class="main-container">
        
        <div class="controls">
            
            <div class="control-group">
                <div class="label">System Status</div>
                <div class="audio-toggle" onclick="enableAudio()">
                    <span class="status-dot" id="audio-status"></span>
                    <span id="audio-label-text">Enable Audio</span>
                </div>
            </div>

            <hr style="width: 100%; border: 0; border-top: 1px solid #eee;">

            <div class="control-group">
                <div class="label">Translation Output</div>
                <select id="langSelect">
                    <option value="en">English (Text & Audio)</option>
                    <option value="hi">Hindi (हिंदी)</option>
                </select>
            </div>

            <div class="control-group">
                <div class="label">Voice Persona</div>
                <select id="voiceSelect">
                    <option value="female">Woman (Standard)</option>
                    <option value="male">Man (Deep)</option>
                    <option value="child">Child (Fast)</option>
                    <option value="robot">Robot (Flat)</option>
                </select>
            </div>

        </div>

        <div class="content-wrapper">
            <div class="video-card">
                <img src="{{ url_for('video_feed') }}" class="video-feed" alt="Live Camera Feed">
            </div>

            <div class="output-card">
                <div class="output-label">Detected Sentence</div>
                <div id="result-text">Waiting for gesture...</div>
            </div>
        </div>

    </div>

    <script>
        const synth = window.speechSynthesis;
        let audioEnabled = false;
        let voices = [];

        function loadVoices() {
            voices = synth.getVoices();
        }
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        function enableAudio() {
            audioEnabled = true;
            document.getElementById('audio-status').style.backgroundColor = '#48cfad'; // Green
            document.getElementById('audio-label-text').innerText = "Audio Active";
            
            // Wake up engine
            const u = new SpeechSynthesisUtterance("");
            synth.speak(u);
            speak("System Ready", "en");
        }

        function getVoiceConfig(profile, lang) {
            let config = { voice: null, pitch: 1, rate: 0.9 };
            
            let targetVoices = voices;
            
            if (lang === 'hi') {
                const hindiVoice = voices.find(v => v.lang.includes('hi') || v.name.includes('Hindi'));
                if (hindiVoice) {
                    config.voice = hindiVoice;
                    return config; 
                }
            }

            const maleVoice = voices.find(v => v.name.includes('David') || v.name.includes('Male') || v.name.includes('Google US English'));
            const femaleVoice = voices.find(v => v.name.includes('Zira') || v.name.includes('Female') || v.name.includes('Google UK English Female'));

            if (profile === 'male') {
                config.voice = maleVoice || voices[0];
                config.pitch = 0.9; 
                config.rate = 0.95; 
            } else if (profile === 'female') {
                config.voice = femaleVoice || voices[0];
                config.pitch = 1.1; 
                config.rate = 1.0;
            } else if (profile === 'child') {
                config.voice = femaleVoice || voices[0];
                config.pitch = 1.6; 
                config.rate = 1.1; 
            } else if (profile === 'robot') {
                config.voice = voices[0];
                config.pitch = 0.5;
                config.rate = 0.8;
            }

            return config;
        }

        function speak(text, lang) {
            if (!audioEnabled || !text) return;
            if (synth.speaking) synth.cancel();

            const utterThis = new SpeechSynthesisUtterance(text);
            const profile = document.getElementById('voiceSelect').value;
            
            utterThis.lang = (lang === 'hi') ? 'hi-IN' : 'en-US';
            const config = getVoiceConfig(profile, lang);

            if (config.voice) utterThis.voice = config.voice;
            utterThis.pitch = config.pitch;
            utterThis.rate = config.rate;

            synth.speak(utterThis);
        }

        // --- SERVER POLLING ---
        setInterval(() => {
            fetch('/get_prediction')
                .then(response => response.json())
                .then(data => {
                    if (data.english && data.english !== "") {
                        
                        const lang = document.getElementById('langSelect').value;
                        const textBox = document.getElementById('result-text');
                        
                        const displayText = (lang === 'hi') ? data.hindi : data.english;

                        textBox.innerText = displayText;
                        
                        // Fade Animation
                        textBox.style.transition = "opacity 0.2s";
                        textBox.style.opacity = 0;
                        setTimeout(() => textBox.style.opacity = 1, 50);

                        speak(displayText, lang);
                    }
                });
        }, 500);

    </script>
</body>
</html>
